<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EarnMoneyTask</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#0f172a;
color:#fff;
padding:18px;
padding-bottom:90px;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.logo{

font-size:28px;
font-weight:700;

}

.level{

background:#22c55e;
padding:8px 14px;
border-radius:30px;
font-size:14px;

}

.card{

background:#1e293b;
border-radius:20px;
padding:20px;
margin-bottom:18px;
box-shadow:0 5px 18px rgba(0,0,0,.3);

}

.balance{

font-size:40px;
font-weight:bold;
margin-top:10px;
color:#22c55e;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.menu{

background:#334155;
padding:18px;
border-radius:18px;
text-align:center;

}

.menu h3{

margin-top:8px;
font-size:16px;

}

button{

width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
margin-top:15px;

}

.progress{

height:12px;
background:#475569;
border-radius:30px;
overflow:hidden;
margin-top:10px;

}

.bar{

height:12px;
width:0%;
background:#22c55e;

}

.history{

margin-top:15px;

}

.history-item{

display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #334155;

}

.bottom{

position:fixed;
left:0;
bottom:0;
width:100%;
background:#1e293b;
display:flex;
justify-content:space-around;
padding:15px 0;

}

.bottom div{

text-align:center;
font-size:13px;

}

input{

width:100%;
padding:15px;
background:#334155;
border:none;
border-radius:12px;
color:white;
margin-top:15px;

}

</style>

</head>

<body>

<div class="header">

<div>

<div class="logo">
EarnMoneyTask
</div>

<small>Telegram Mini App</small>

</div>

<div class="level">
🥉 Bronze
</div>

</div>

<div class="card">

<h3>Saldo Anda</h3>

<div class="balance" id="saldo">
Rp0
</div>

<p>
Iklan hari ini:
<span id="jumlah">
0
</span>/10
</p>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

<button onclick="watchAd()">
🎬 Tonton Iklan
</button>

</div>

<div class="grid">

<div class="menu">
🎁
<h3>Check In</h3>
<button onclick="claimBonus()">
Claim
</button>
</div>

<div class="menu">
👥
<h3>Referral</h3>
<button onclick="inviteFriend()">
Undang
</button>
</div>

<div class="menu">
💳
<h3>Withdraw</h3>
<button onclick="withdraw()">
Tarik
</button>
</div>

<div class="menu">
📋
<h3>Tugas</h3>
<button>
Lihat
</button>
</div>

</div>

<div class="card">

<h3>Riwayat Reward</h3>

<div id="history" class="history">

</div>

    </div>

    <div class="bottom">

<div onclick="alert('Home')">
🏠
<br>
Home
</div>

<div onclick="alert('Tugas')">
📋
<br>
Tugas
</div>

<div onclick="alert('Dompet')">
💰
<br>
Wallet
</div>

<div onclick="alert('Profil')">
👤
<br>
Profil
</div>

</div>

<script>

Telegram.WebApp.ready();

let saldo = Number(localStorage.getItem("saldo")) || 0;
let jumlah = Number(localStorage.getItem("jumlah")) || 0;
let claimHari = localStorage.getItem("claimHari") || "";

const BLOCK_ID = "38922";

let AdController = null;

if(window.Adsgram){
    AdController = window.Adsgram.init({
        blockId: BLOCK_ID
    });
}

function simpan(){

localStorage.setItem("saldo",saldo);
localStorage.setItem("jumlah",jumlah);
localStorage.setItem("claimHari",claimHari);

}

function update(){

document.getElementById("saldo").innerHTML="Rp "+saldo.toLocaleString("id-ID");

document.getElementById("jumlah").innerHTML=jumlah;

document.getElementById("bar").style.width=(jumlah*10)+"%";

simpan();

}

function tambahHistory(text){

const item=document.createElement("div");

item.className="history-item";

item.innerHTML="<span>"+text+"</span><span>"+new Date().toLocaleTimeString()+"</span>";

document.getElementById("history").prepend(item);

}

function claimBonus(){

const hari=new Date().toDateString();

if(claimHari===hari){

alert("Bonus hari ini sudah diambil.");

return;

}

claimHari=hari;

saldo+=500;

tambahHistory("🎁 Bonus Harian +Rp500");

update();

}

function watchAd(){

if(jumlah>=10){

alert("Batas iklan hari ini sudah habis.");

return;

}

if(!AdController){

alert("AdsGram belum siap.");

return;

}

AdController.show()

.then(()=>{

saldo+=200;

jumlah++;

tambahHistory("🎬 Reward Ads +Rp200");

update();

})

.catch(()=>{

alert("Iklan dibatalkan atau gagal dimuat.");

});

}

function inviteFriend(){

alert("Fitur referral akan kita hubungkan pada tahap berikutnya.");

}

function withdraw(){

if(saldo<50000){

alert("Minimal withdraw Rp50.000");

return;

}

alert("Permintaan withdraw berhasil dikirim.");

}

update();

</script>

</body>
</html>
