<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EarnMoneyTask</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
color:white;
padding:20px;
}
.card{
background:#1f1f1f;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}
h1{
margin:0;
font-size:34px;
}
p{
color:#aaa;
}
.balance{
font-size:42px;
font-weight:bold;
color:#00ff66;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
background:#00c853;
color:white;
margin-top:12px;
}
small{
color:#bbb;
}
.progress{
width:100%;
height:12px;
background:#333;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}
.bar{
height:12px;
width:0%;
background:#00ff66;
}
</style>
</head>
  
<body>

<div class="container">

<h1>EarnMoneyTask</h1>
<p>Hasilkan uang dengan menyelesaikan tugas.</p>

<div class="card">
<h2>Saldo</h2>
<h1 id="saldo">Rp 0</h1>
<p>Level : <b>Perunggu</b></p>
<p>Iklan tersisa : <span id="adsLeft">10</span>/10</p>
</div>

<div class="card">
<h2>Absen Harian</h2>
<button id="checkin">🎁 Claim Bonus</button>
</div>

<div class="card">
<h2>Tonton Iklan</h2>
<button id="showAd">🎬 Tonton Iklan</button>
</div>

<div class="card">
<h2>Tugas Hari Ini</h2>

<p>Tonton 5 iklan</p>
<progress id="progress" value="0" max="5"></progress>

<p id="taskStatus">0 / 5</p>

</div>

<div class="card">
<h2>Withdraw</h2>
<button id="withdraw">💳 Tarik Saldo</button>
</div>

<div class="card">
<h2>Referral</h2>
<p>Undang teman dan dapatkan bonus.</p>
<button id="invite">👥 Undang Teman</button>
</div>

</div>

<script src="script.js"></script>

  </body>
