<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EarnMoneyTask</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
color:white;
padding:20px;
}
.card{
background:#1f1f1f;
padding:18px;
border-radius:18px;
margin-bottom:15px;
}
h1{
margin:0;
font-size:34px;
}
p{
color:#aaa;
}
.balance{
font-size:42px;
font-weight:bold;
color:#00ff66;
}
button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:bold;
background:#00c853;
color:white;
margin-top:12px;
}
small{
color:#bbb;
}
.progress{
width:100%;
height:12px;
background:#333;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}
.bar{
height:12px;
width:0%;
background:#00ff66;
}
</style>

</head>
<body>

<h1>EarnMoneyTask</h1>
<p>Hasilkan uang dengan menyelesaikan tugas.</p>

<div class="card">
<h2>Saldo</h2>
<div class="balance" id="saldo">Rp 0</div>
<small>Iklan ditonton: <span id="jumlah">0</span>/10</small>
<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<div class="card">
<h2>Absen Harian</h2>
<button id="checkin">🎁 Claim Harian</button>
</div>

<div class="card">
<h2>Tonton Iklan</h2>
<button id="showAd">🎬 Tonton Iklan</button>
</div>

<script>

let saldo=0;
let jumlah=0;

const AdController=window.Adsgram.init({
blockId:"38922"
});

document.getElementById("checkin").onclick=function(){

saldo+=500;

document.getElementById("saldo").innerHTML="Rp "+saldo;

alert("Bonus harian Rp500 berhasil diklaim.");

this.disabled=true;

this.innerHTML="✅ Sudah Diklaim";

};

document.getElementById("showAd").onclick=function(){

AdController.show()

.then(()=>{

saldo+=100;

jumlah++;

document.getElementById("saldo").innerHTML="Rp "+saldo;

document.getElementById("jumlah").innerHTML=jumlah;

document.getElementById("bar").style.width=(jumlah*10)+"%";

alert("Selamat! Kamu mendapat Rp100.");

})

.catch(()=>{

alert("Iklan gagal atau ditutup.");

});

};

</script>

</body>
</html>
