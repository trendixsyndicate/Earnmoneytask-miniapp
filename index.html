<!<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

</head>
<body>

<h2>Halo Telegram</h2>

<button id="showAd">Tonton Iklan</button>

<script>
const AdController = window.Adsgram.init({
  blockId: "38922"
});

document.getElementById("showAd").onclick = () => {
  AdController.show()
    .then(() => {
      alert("Iklan selesai!");
    })
    .catch(() => {
      alert("Iklan gagal atau ditutup.");
    });
};
</script>

</body>
</html>
