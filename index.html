<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EarnMoneyTask</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:#fff;
padding:20px;
padding-bottom:100px;
}

.container{
max-width:700px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo h1{
font-size:42px;
font-weight:bold;
}

.logo p{
color:#cbd5e1;
margin-top:5px;
font-size:18px;
}

.level{
background:#22c55e;
padding:15px 25px;
border-radius:20px;
font-size:20px;
text-align:center;
}

.card{
background:#1e293b;
padding:25px;
border-radius:25px;
margin-top:20px;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

.card h2{
font-size:22px;
margin-bottom:20px;
}

.balance{
font-size:64px;
font-weight:bold;
color:#22c55e;
margin-bottom:15px;
}

.info{
font-size:22px;
color:#d1d5db;
margin-bottom:20px;
}

.progress{
width:100%;
height:18px;
background:#475569;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:18px;
width:0%;
background:#22c55e;
transition:.3s;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:#22c55e;
color:#fff;
font-size:28px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.small-card{
background:#334155;
padding:25px;
border-radius:25px;
text-align:center;
}

.small-card h3{
font-size:36px;
margin-bottom:20px;
}

.small-card button{
font-size:22px;
padding:18px;
}

.history{
margin-top:20px;
}

.history-item{
background:#334155;
padding:15px;
border-radius:15px;
margin-top:10px;
font-size:18px;
}

.bottom{
position:fixed;
left:0;
right:0;
bottom:0;
background:#1e293b;
display:flex;
justify-content:space-around;
padding:15px 0;
font-size:18px;
}

.bottom div{
text-align:center;
cursor:pointer;
}

.notice{
margin-top:20px;
background:#14532d;
padding:18px;
border-radius:15px;
font-size:18px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
<h1>EarnMoneyTask</h1>
<p>Telegram Mini App</p>
</div>

<div class="level" id="level">
🥉 Bronze
</div>

</div>

<div class="card">

<h2>Saldo Anda</h2>

<div class="balance" id="saldo">
Rp 0
</div>

<div class="info">
Iklan hari ini:
<span id="jumlah">0</span>/10
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<button onclick="watchAd()">
🎬 Tonton Iklan
</button>

</div>
<div class="grid">

<div class="small-card">
<h3>🎁</h3>
<h2>Check In</h2>
<button onclick="claimDaily()">
Claim
</button>
</div>

<div class="small-card">
<h3>👥</h3>
<h2>Referral</h2>
<button onclick="inviteFriend()">
Undang
</button>
</div>

<div class="small-card">
<h3>💳</h3>
<h2>Withdraw</h2>
<button onclick="withdraw()">
Tarik Saldo
</button>
</div>

<div class="small-card">
<h3>📋</h3>
<h2>Tugas</h2>

<p id="taskText">
Tonton 10 iklan
</p>

</div>

</div>

<div class="card">

<h2>Riwayat Aktivitas</h2>

<div id="history" class="history">

</div>

</div>

<div class="notice" id="status">
Selamat datang 👋
</div>

</div>

<div class="bottom">

<div onclick="alert('Home')">
🏠
<br>
Home
</div>

<div onclick="alert('Tugas')">
📋
<br>
Tugas
</div>

<div onclick="alert('Wallet')">
💰
<br>
Wallet
</div>

<div onclick="alert('Profil')">
👤
<br>
Profil
</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

const user = tg.initDataUnsafe.user;

let saldo = Number(localStorage.getItem("saldo")) || 0;
let iklan = Number(localStorage.getItem("iklan")) || 0;
let history = JSON.parse(localStorage.getItem("history") || "[]");

function saveData() {
    localStorage.setItem("saldo", saldo);
    localStorage.setItem("iklan", iklan);
    localStorage.setItem("history", JSON.stringify(history));
}

function addHistory(text) {
    const waktu = new Date().toLocaleString("id-ID");

    history.unshift({
        text: text,
        time: waktu
    });

    if (history.length > 20) {
        history.pop();
    }

    saveData();
}

function renderHistory() {

    const box = document.getElementById("history");

    if (history.length === 0) {
        box.innerHTML = "<p>Belum ada aktivitas.</p>";
        return;
    }

    box.innerHTML = "";

    history.forEach(item => {

        box.innerHTML += `
        <div class="item">
            <b>${item.text}</b><br>
            <small>${item.time}</small>
        </div>
        `;

    });

}

function updateUI() {

    document.getElementById("saldo").innerHTML =
        "Rp " + saldo.toLocaleString("id-ID");

    document.getElementById("iklan").innerHTML =
        iklan + "/10";

    document.getElementById("bar").style.width =
        (iklan * 10) + "%";

    renderHistory();

    saveData();

}

function watchAd() {

    if (iklan >= 10) {
        alert("Batas iklan hari ini sudah tercapai.");
        return;
    }

    tg.showPopup({
        title: "Tonton Iklan",
        message: "Simulasi menonton iklan selama 5 detik.",
        buttons: [
            {
                id: "watch",
                type: "default",
                text: "Mulai"
            },
            {
                id: "cancel",
                type: "cancel"
            }
        ]
    }, function(id){

        if(id === "watch"){

            document.getElementById("status").innerHTML =
            "Menonton iklan...";

            setTimeout(function(){

                saldo += 500;
                iklan++;

                addHistory("Menonton iklan (+Rp500)");

                document.getElementById("status").innerHTML =
                "Hadiah berhasil diterima.";

                updateUI();

            },5000);

        }

    });

}

function claimDaily(){

    const hariIni = new Date().toDateString();

    const terakhir = localStorage.getItem("daily");

    if(terakhir === hariIni){
        alert("Check-in hari ini sudah diklaim.");
        return;
    }

    saldo += 1000;

    localStorage.setItem("daily", hariIni);

    addHistory("Check-in harian (+Rp1.000)");

    updateUI();

    alert("Bonus harian berhasil diklaim.");
}

function inviteFriend(){

    if(user && user.username){

        const link =
        "https://t.me/Earnmoneytaskjob_bot?start=" + user.id;

        tg.openTelegramLink(
            "https://t.me/share/url?url=" +
            encodeURIComponent(link)
        );

    }else{

        alert("Username Telegram belum tersedia.");

    }

}

function withdraw(){

    if(saldo < 50000){
        alert("Minimal withdraw Rp50.000");
        return;
    }

    addHistory("Mengajukan withdraw");

    alert("Permintaan withdraw berhasil dikirim.");
}

updateUI();
