<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EarnMoneyTask</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:20px;
}

h1{
font-size:38px;
margin-bottom:10px;
}

p{
color:#aaa;
margin-bottom:20px;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

.balance{
font-size:52px;
font-weight:bold;
color:#00ff66;
margin:15px 0;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#00cc55;
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(.98);
}

.progress{
height:12px;
background:#333;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:12px;
width:0%;
background:#00ff66;
}

small{
color:#bbb;
font-size:18px;
}

.notice{
background:#1f1f1f;
padding:15px;
border-radius:15px;
margin-top:20px;
text-align:center;
color:#00ff66;
font-weight:bold;
}
</style>

</head>
<body>

<h1>EarnMoneyTask</h1>
<p>Hasilkan uang dengan menyelesaikan tugas.</p>

<div class="card">

<h2>Saldo</h2>

<div class="balance" id="saldo">
Rp 0
</div>

<small>
Iklan ditonton:
<span id="jumlah">0</span>/10
</small>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<div class="card">

<h2>Absen Harian</h2>

<br>

<button onclick="claim()">
🎁 Claim Harian
</button>

</div>

<div class="card">

<h2>Tonton Iklan</h2>

<br>

<button onclick="watchAd()">
🎬 Tonton Iklan
</button>

</div>

<div class="notice" id="status">
Selamat datang 👋
</div>

<script>

let saldo=0;
let iklan=0;

function update(){

document.getElementById("saldo").innerHTML="Rp "+saldo.toLocaleString("id-ID");

document.getElementById("jumlah").innerHTML=iklan;

document.getElementById("bar").style.width=(iklan*10)+"%";

}

function claim(){

saldo+=500;

let saldo = Number(localStorage.getItem("saldo")) || 0;
let iklan = Number(localStorage.getItem("iklan")) || 0;
let claim = localStorage.getItem("claim") || "";

function simpan(){
    localStorage.setItem("saldo", saldo);
    localStorage.setItem("iklan", iklan);
    localStorage.setItem("claim", claim);
}

function update(){

    document.getElementById("saldo").innerHTML =
    "Rp " + saldo.toLocaleString("id-ID");

    document.getElementById("jumlah").innerHTML =
    iklan + "/10";

    document.getElementById("bar").style.width =
    (iklan * 10) + "%";

    simpan();
}

function claimBonus(){

    let hari = new Date().toDateString();

    if(claim == hari){
        alert("Bonus hari ini sudah diambil.");
        return;
    }

    saldo += 500;
    claim = hari;

    update();

    alert("Bonus Rp500 berhasil ditambahkan.");
}

function watchAd(){

    if(iklan >= 10){
        alert("Batas iklan hari ini sudah habis.");
        return;
    }

    setTimeout(function(){

        saldo += 200;
        iklan++;

        update();

        alert("Hadiah Rp200 berhasil ditambahkan.");

    },3000);

}

function withdraw(){

    if(saldo < 50000){
        alert("Minimal withdraw Rp50.000");
        return;
    }

    alert("Permintaan withdraw berhasil dikirim.");
}

update();
